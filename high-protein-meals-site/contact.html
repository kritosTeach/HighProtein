<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - High Protein Quick Meals</title>
  <meta name="description" content="Get in touch for recipe requests, collaborations, or questions about high protein quick meals.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav class="nav-container">
        <a href="index.html" class="logo">High Protein Quick Meals</a>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="blog.html">Recipes</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 4rem 0; max-width: 800px;">
    <h1>Contact Us</h1>
    <p>Questions about recipes? Recipe requests? Partnerships? We'd love to hear from you!</p>
    
    <form id="contact-form" style="margin: 2rem 0;">
      <div style="margin-bottom: 1rem;">
        <label for="name">Name</label>
        <input type="text" id="name" required style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #ddd;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="email">Email</label>
        <input type="email" id="email" required style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #ddd;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="message">Message</label>
        <textarea id="message" rows="6" required style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #ddd;"></textarea>
      </div>
      <button type="submit" class="cta-button" style="background: var(--primary-color); color: white;">Send Message</button>
    </form>

    <!-- Map placeholder -->
    <div style="height: 300px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin: 2rem 0;">
      Google Maps Embed Placeholder
    </div>

    <div class="adsense-placeholder">Contact Page Ad</div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
      <p>&copy; 2024 High Protein Quick Meals.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
